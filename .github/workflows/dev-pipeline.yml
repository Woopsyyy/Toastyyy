name: Dev Branch CI/CD Pipeline

on:
  push:
    branches:
      - dev

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

jobs:
  validate-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Send Discord Pipeline Started Notification
        if: env.DISCORD_WEBHOOK != ''
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{
              "embeds": [{
                "title": "🚀 CI/CD Pipeline Started",
                "description": "Validation checks started on **dev** branch.",
                "color": 3447003,
                "fields": [
                  {"name": "Repository", "value": "`${{ github.repository }}`", "inline": true},
                  {"name": "Branch", "value": "`dev`", "inline": true},
                  {"name": "Author", "value": "`${{ github.actor }}`", "inline": true},
                  {"name": "Commit Message", "value": "${{ github.event.head_commit.message }}"},
                  {"name": "Workflow Run", "value": "[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
                ]
              }]
            }' \
            "$DISCORD_WEBHOOK"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier Validation
        id: prettier
        run: pnpm exec prettier --check "src/**/*.{ts,tsx,css}"

      - name: Run ESLint
        id: eslint
        run: pnpm run lint

      - name: Run TypeScript Compile Verification
        id: typecheck
        run: pnpm exec tsc --noEmit

      - name: Run Unit Tests
        id: tests
        run: |
          if pnpm run | grep -q "test"; then
            pnpm run test
          else
            echo "No test suite defined yet, skipping."
          fi

      - name: Run Security Auditing
        id: security
        run: pnpm audit --audit-level=high || echo "Audited with some recommendations."

      - name: Run Build Check
        id: build
        run: pnpm run build

      - name: Bundle Size Audit
        id: bundlesize
        run: |
          echo "### Build Artifact Sizes" >> $GITHUB_STEP_SUMMARY
          du -sh dist/* >> $GITHUB_STEP_SUMMARY || echo "No dist files yet."

      - name: Send Discord Quality Success Notification
        if: success() && env.DISCORD_WEBHOOK != ''
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{
              "embeds": [{
                "title": "✅ CI Code Validation Passed",
                "description": "All linting, compile, test, and build safety verifications passed.",
                "color": 3066993,
                "fields": [
                  {"name": "Repository", "value": "`${{ github.repository }}`", "inline": true},
                  {"name": "Branch", "value": "`dev`", "inline": true},
                  {"name": "Workflow Run", "value": "[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
                ]
              }]
            }' \
            "$DISCORD_WEBHOOK"

      - name: Send Discord Validation Failure Notification
        if: failure() && env.DISCORD_WEBHOOK != ''
        run: |
          curl -H "Content-Type: application/json" -X POST \
            -d '{
              "embeds": [{
                "title": "❌ CI Code Validation Failed",
                "description": "One or more safety validation checks failed on the dev branch.",
                "color": 15158332,
                "fields": [
                  {"name": "Repository", "value": "`${{ github.repository }}`", "inline": true},
                  {"name": "Branch", "value": "`dev`", "inline": true},
                  {"name": "Author", "value": "`${{ github.actor }}`", "inline": true},
                  {"name": "Workflow Run", "value": "[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"}
                ]
              }]
            }' \
            "$DISCORD_WEBHOOK"
