name: CI/CD - Vercel Deployment

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate-and-deploy:
    name: Validate and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Code
        run: pnpm run lint

      - name: Typecheck and Build
        run: pnpm run build

      - name: Check Vercel Credentials
        id: check-creds
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::Vercel secrets are not configured in GitHub Repository Settings. Skipping deployment steps."
            echo "has_creds=false" >> $GITHUB_OUTPUT
          else
            echo "has_creds=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.check-creds.outputs.has_creds == 'true'
        run: npm install --global vercel@latest

      # --- PREVIEW DEPLOYMENT ---
      - name: Pull Vercel Preview Environment Information
        if: steps.check-creds.outputs.has_creds == 'true' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts (Preview)
        if: steps.check-creds.outputs.has_creds == 'true' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel (Preview)
        if: steps.check-creds.outputs.has_creds == 'true' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      # --- PRODUCTION DEPLOYMENT ---
      - name: Pull Vercel Production Environment Information
        if: steps.check-creds.outputs.has_creds == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts (Production)
        if: steps.check-creds.outputs.has_creds == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel (Production)
        if: steps.check-creds.outputs.has_creds == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
